<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartManager – Complete Management System</title>
    <style>
        /* Reset and Base Styles */
        body {
            font-family: 'Tahoma', 'Verdana', sans-serif;
            background-color: #c0c0c0; /* Classic Windows Gray */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- HEADER SECTION --- */
        .header {
            background-color: #000080; /* Navy Blue */
            color: white;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px; /* Increased slightly to fit the logo comfortably */
            border-bottom: 3px solid #ffffff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: relative;
            z-index: 101;
        }

        .logo-area {
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 12px; /* Space between logo and text */
        }

        /* Styling for the Image Logo */
        .header-logo {
            height: 50px; /* Adjust height to fit inside header */
            width: auto;
            object-fit: contain;
        }

        .logo-text {
            font-weight: bold;
            font-size: 20px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Hamburger Button */
        .hamburger {
            display: none; /* Hidden on desktop */
            background: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            padding: 6px 12px;
            font-size: 20px;
            cursor: pointer;
            color: #000;
            margin-right: 15px;
            font-weight: bold;
        }
        .hamburger:active {
            border-color: #808080 #ffffff #ffffff #808080;
            transform: translate(1px, 1px);
        }

        /* --- NAVIGATION BAR (Button Navmenu) --- */
        .navbar {
            background-color: #d4d0c8;
            padding: 5px;
            border-bottom: 2px solid #808080;
            display: flex;
            justify-content: center; /* Center buttons */
            flex-wrap: wrap;
            gap: 5px;
            position: relative;
        }

        .nav-item {
            position: relative;
            display: inline-block;
        }

        /* Retro Button Style for Nav */
        .nav-btn {
            background-color: #d4d0c8;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff; 
            padding: 6px 15px;
            font-family: Tahoma, sans-serif;
            font-weight: bold;
            font-size: 13px;
            color: #000;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            min-width: 100px;
            justify-content: center;
        }

        .nav-btn:hover {
            background-color: #e0e0e0;
        }

        .nav-btn:active, .nav-btn.active {
            border-color: #808080 #ffffff #ffffff #808080;
            background-color: #c0c0c0;
            transform: translate(1px, 1px);
        }

        /* Arrow for dropdown */
        .arrow {
            font-size: 10px;
            margin-top: 2px;
        }

        /* --- SUBMENU (Dropdown) --- */
        .submenu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: #d4d0c8;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff; /* Outer Bevel */
            box-shadow: 4px 4px 10px rgba(0,0,0,0.3);
            min-width: 180px;
            z-index: 100;
            padding: 2px;
            flex-direction: column;
            gap: 2px;
        }

        /* Show submenu on hover (Desktop) */
        .nav-item:hover .submenu {
            display: flex;
        }

        /* Submenu Buttons */
        .submenu .nav-btn {
            width: 100%;
            justify-content: flex-start;
            border: none; /* Flat look inside menu */
            border-bottom: 1px dotted #999;
        }
        
        .submenu .nav-btn:last-child {
            border-bottom: none;
        }

        .submenu .nav-btn:hover {
            background-color: #000080;
            color: white;
        }

        /* --- MAIN CONTENT WRAPPER --- */
        .main-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Dashboard Card */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-width: 600px;
            width: 100%;
            background-color: #d4d0c8;
            padding: 30px;
            border: 2px solid #808080;
            border-right-color: #ffffff;
            border-bottom-color: #ffffff;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.3);
            text-align: center;
        }

        .welcome-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            border: 2px solid #808080;
            background: #fff;
            padding: 10px;
        }

        .dashboard-text h2 {
            margin: 0 0 10px 0;
            color: #000080;
            font-size: 24px;
        }

        .dashboard-text p {
            color: #444;
            margin-bottom: 20px;
        }

        /* Action Button in Center */
        .start-btn {
            background: #000080;
            color: white;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff; 
            padding: 10px 30px;
            font-family: Tahoma, sans-serif;
            font-weight: bold;
            cursor: pointer;
        }
        .start-btn:hover {
            background: #0000a0;
        }

        /* --- FOOTER --- */
        .footer {
            background-color: #000080;
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 12px;
            border-top: 2px solid #ffffff;
            margin-top: auto;
        }

        /* --- RESPONSIVE STYLES --- */
        @media (max-width: 768px) {
            .header {
                height: 60px; /* Slightly smaller on mobile */
            }
            .header-logo {
                height: 40px;
            }
            .logo-text {
                font-size: 16px;
            }

            .hamburger {
                display: block;
            }

            .navbar {
                display: none; /* Hide nav by default on mobile */
                flex-direction: column;
                width: 100%;
                align-items: stretch;
                padding: 10px;
                position: absolute;
                top: 60px; /* Below header */
                left: 0;
                box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            }

            .navbar.active {
                display: flex; /* Show when active */
            }

            .nav-item {
                width: 100%;
            }

            .nav-btn {
                width: 100%;
                justify-content: space-between; /* Push arrow to right */
            }

            /* Mobile Submenu Logic */
            .submenu {
                position: static;
                display: none;
                box-shadow: none;
                border: none;
                border-left: 4px solid #000080;
                margin-left: 10px;
                margin-bottom: 5px;
                background: #e0e0e0;
            }

            /* On mobile, hover doesn't work well, so we use JS class toggle */
            .nav-item.mobile-open .submenu {
                display: flex;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <div class="logo-area">
            <!-- USER PROVIDED LOGO IMAGE (Fixed typo .co.com -> .co) -->
            <img src="https://i.ibb.co/jv71B2wK/Smart-Manager-removebg-preview.png" alt="SmartManager Logo" class="header-logo">
            <span class="logo-text">SmartManager</span>
        </div>

        <!-- Hamburger Menu Button -->
        <button class="hamburger" onclick="toggleMenu()">☰</button>
    </div>

    <!-- NAVIGATION BAR (Button Navmenu) -->
    <nav class="navbar" id="navbar">
        
        <!-- Home Link -->
        <div class="nav-item">
            <a href="https://sprgroupbd.github.io/SmartManager/" class="nav-btn" onclick="openPage('#')">
                Home
            </a>
        </div>

        <!-- Entry Menu (With Submenu) -->
        <div class="nav-item" onclick="toggleMobileSubmenu(this)">
            <button class="nav-btn">
                Entry <span class="arrow">▼</span>
            </button>
            <!-- Subnavmenu -->
            <div class="submenu">
                <button class="nav-btn" onclick="openPage('https://sprgroupbd.github.io/SmartManager/bill')">
                    Bill Entry
                </button>
                <button class="nav-btn" onclick="openPage('https://sprgroupbd.github.io/monico/')">
                    Sample Entry
                </button>
                <button class="nav-btn" onclick="openPage('https://sprgroupbd.github.io/SmartManager/IOU')">
                    IOU Entry
                </button>
            </div>
        </div>

        <!-- History Link -->
        <div class="nav-item">
            <a href="#" class="nav-btn" onclick="openPage('https://sprgroupbd.github.io/SmartManager/user')">
                History
            </a>
        </div>

        <!-- Actions Menu (With Submenu) -->
        <div class="nav-item" onclick="toggleMobileSubmenu(this)">
            <button class="nav-btn">
                Actions <span class="arrow">▼</span>
            </button>
            <!-- Subnavmenu -->
            <div class="submenu">
                
                <button class="nav-btn" onclick="openPage('report.html')">
                    Report
                </button>
            </div>
        </div>

        <!-- Settings Link -->
        <div class="nav-item">
            <a href="#" class="nav-btn" onclick="openPage('settings.html')">
                Settings
            </a>
        </div>

    </nav>

    <!-- MAIN CONTENT -->
    <div class="main-wrapper">
        <div class="container">
            <!-- Welcome Icon -->
            <img src="https://i.ibb.co.com/jv71B2wK/Smart-Manager-removebg-preview.png" alt="Dashboard" class="welcome-icon">
            
            <div class="dashboard-text">
                <h2>Welcome Back!</h2>
                <p>Select an option from the menu above to begin managing your system.</p>
            </div>

            <!-- Quick Start Button -->
            <button class="start-btn" onclick="openPage('https://sprgroupbd.github.io/SmartManager/bill')">
                Start New Entry
            </button>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        Developed By: <b>Md Sajjad Ahmed</b>
    </div>

    <!-- JAVASCRIPT -->
    <script>
        // Function to navigate to pages
        function openPage(page) {
            if(page && page !== '#') {
                window.location.href = page;
            }
        }

        // Toggle Hamburger Menu on Mobile
        function toggleMenu() {
            const nav = document.getElementById('navbar');
            nav.classList.toggle('active');
        }

        // Handle Submenus on Mobile
        function toggleMobileSubmenu(element) {
            // Only activate this logic if we are in mobile view
            if (window.innerWidth <= 768) {
                element.classList.toggle('mobile-open');
                
                // Close other open submenus (accordion style)
                const allItems = document.querySelectorAll('.nav-item');
                allItems.forEach(item => {
                    if (item !== element) {
                        item.classList.remove('mobile-open');
                    }
                });
            }
        }

        // Close menus when clicking outside
        document.addEventListener('click', function(event) {
            const nav = document.getElementById('navbar');
            const hamburger = document.querySelector('.hamburger');
            
            if (!nav.contains(event.target) && !hamburger.contains(event.target) && nav.classList.contains('active')) {
                nav.classList.remove('active');
            }
        });
    </script>

</body>
</html>
