<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IOU Entry System - Monico Pharma</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #C0C0C0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 14px; }
        
        /* Login Container */
        .login-container{
            max-width:350px;
            margin: 100px auto;
        }

        /* Main Container */
        .iou-container {
            max-width: 900px;
            margin: 20px auto;
            padding: 10px;
        }

        /* card = VB6 form style */
        .card{
            background:#C0C0C0;
            border:2px solid #808080;
            box-shadow: inset 2px 2px #ffffff, inset -2px -2px #404040;
        }

        /* title bar */
        .card-header{
            background:#000080 !important;
            color:white !important;
            font-weight:bold;
        }

        /* textbox */
        .form-control{
            border:2px inset #808080;
            border-radius:0;
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- LOGIN SECTION -->
    <div id="login_section" class="container login-container">
        <div class="card shadow-lg">
            <div class="card-header bg-primary text-white text-center"><h4>System Login</h4></div>
            <div class="card-body">
                <div class="mb-3"><label>Username</label><input type="text" id="username" class="form-control" placeholder="Enter Username"></div>
                <div class="mb-3"><label>Password</label><input type="password" id="password" class="form-control" placeholder="Enter Password"></div>
                <button onclick="handleLogin()" class="btn btn-primary w-100">Login</button>
            </div>
        </div>
    </div>

    <!-- IOU ENTRY SECTION -->
    <div id="iou_section" class="container iou-container hidden">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h4 class="mb-0 text-primary"><i class="bi bi-file-earmark-plus"></i> IOU Entry</h4>
            <div>
                <span id="welcome_msg" class="me-3 fw-bold text-secondary"></span>
                <button onclick="logout()" class="btn btn-danger btn-sm"><i class="bi bi-box-arrow-right"></i> Logout</button>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-info text-white py-2">
                <h6 class="mb-0">New IOU Details</h6>
            </div>
            <div class="card-body">
                <div class="row g-2 mb-2">
                    <!-- Row 1: Date, DA Name, Territory, MPO -->
                    <div class="col-6 col-md-3">
                        <label>Date</label>
                        <input type="date" id="iou_date" class="form-control form-control-sm">
                    </div>
                    <div class="col-6 col-md-3">
                        <label>DA Name</label>
                        <select id="iou_da_name" class="form-select form-select-sm">
                            <option value="">Select DA</option>
                        </select>
                    </div>
                    <div class="col-6 col-md-3">
                        <label>Territory</label>
                        <input type="text" id="iou_territory" class="form-control form-control-sm">
                    </div>
                    <div class="col-6 col-md-3">
                        <label>MPO</label>
                        <input type="text" id="iou_mpo" class="form-control form-control-sm">
                    </div>
                    
                    <!-- Row 2: Summary, Sales, Return, Sold -->
                    <div class="col-4 col-md-2">
                        <label>Summary</label>
                        <input type="text" id="iou_summary" class="form-control form-control-sm">
                    </div>
                    <div class="col-4 col-md-2">
                        <label>Sales</label>
                        <input type="number" id="iou_sales" class="form-control form-control-sm" oninput="calcIouPercent()">
                    </div>
                    <div class="col-4 col-md-2">
                        <label>Return</label>
                        <input type="number" id="iou_return" class="form-control form-control-sm" value="0" oninput="calcIouPercent()">
                    </div>
                    <div class="col-4 col-md-2">
                        <label>Sold</label>
                        <input type="number" id="iou_sold" class="form-control form-control-sm" readonly>
                    </div>
                    
                    <!-- Row 3: Qty, Bundle, Taka, % -->
                    <div class="col-4 col-md-2">
                        <label>Qty</label>
                        <input type="number" id="iou_qty" class="form-control form-control-sm">
                    </div>
                    <div class="col-4 col-md-2">
                        <label>Bund</label>
                        <input type="number" id="iou_bundle_qty" class="form-control form-control-sm">
                    </div>
                    <div class="col-4 col-md-2">
                        <label>Taka</label>
                        <input type="number" id="iou_taka" class="form-control form-control-sm" oninput="calcIouPercent()">
                    </div>
                    <div class="col-4 col-md-2">
                        <label>%</label>
                        <input type="text" id="iou_percent" class="form-control form-control-sm" readonly>
                    </div>
                    
                    <!-- Row 4: IOU Type & Actions -->
                    <div class="col-12 col-md-6 mt-2">
                        <label class="fw-bold text-primary">IOU Type</label>
                        <select id="iou_type" class="form-select form-select-sm">
                            <option value="Delivery">Delivery (Bill Req)</option>
                            <option value="Collection">Collection (Bill Req)</option>
                            <option value="Return">Return (Bill Req)</option>
                            <option value="General">General (No Bill)</option>
                            <option value="Bill Payment">Bill Payment (No Bill)</option>
                        </select>
                    </div>
                    
                    <div class="col-12 col-md-6 mt-4 d-grid">
                        <button id="iou_save_btn" onclick="saveIOU()" class="btn btn-success"><i class="bi bi-save"></i> Save IOU Entry</button>
                        <button id="iou_cancel_btn" onclick="clearIOUForm()" class="btn btn-secondary mt-1 hidden">Cancel Edit</button>
                    </div>
                </div>
            </div>
            <div class="card-footer text-muted text-center" style="background: #e9ecef; border-top: 2px solid #808080;">
                MONICO PHARMA LTD - Internal Use Only
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // ================= FIREBASE CONFIGURATION =================
        const firebaseConfig = {
            apiKey: "AIzaSyBEaGG_UsXGf6RGHQ_ckalf33fLla-P2J8",
            authDomain: "whatapp-8d8ed.firebaseapp.com",
            databaseURL: "https://whatapp-8d8ed-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "whatapp-8d8ed",
            storageBucket: "whatapp-8d8ed.firebasestorage.app",
            messagingSenderId: "618833956157",
            appId: "1:618833956157:web:2c3835d5c03668afa7c954",
            measurementId: "G-JLG1K25Z7N"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentUser = null;
        let editingIouId = null;
        let daListCache = {};

        // ================= LOGIN LOGIC =================
        function handleLogin() {
            const userVal = document.getElementById('username').value;
            const passVal = document.getElementById('password').value;

            // Superadmin Hardcoded Login
            if (userVal === 'KS' && passVal === 'Monico@Ku007') {
                currentUser = { name: 'Md Sajjad Ahmed', role: 'superadmin', depot: 'Kushtia', id: 'admin_001' };
                showIOUPage();
                return;
            }

            // Database Login
            const userRef = database.ref('Users');
            userRef.orderByChild('username').equalTo(userVal).once('value', (snapshot) => {
                if (snapshot.exists()) {
                    snapshot.forEach((childSnapshot) => {
                        const userData = childSnapshot.val();
                        if (userData.password === passVal) {
                            currentUser = {
                                name: userData.name,
                                role: userData.role || 'user', 
                                depot: userData.depot,
                                id: childSnapshot.key
                            };
                            showIOUPage();
                        } else { alert("Password Incorrect!"); }
                    });
                } else { alert("User not found!"); }
            }, (error) => {
                console.error("Login Error:", error);
                alert("Database Connection Failed!");
            });
        }

        function logout() {
            currentUser = null;
            location.reload();
        }

        function showIOUPage() {
            document.getElementById('login_section').classList.add('hidden');
            document.getElementById('iou_section').classList.remove('hidden');
            
            document.getElementById('welcome_msg').innerText = "Welcome, " + currentUser.name;
            
            // Only Admin or Superadmin can access
            if(currentUser.role === 'user') {
                alert("Access Denied. Admins only.");
                logout();
                return;
            }

            loadDAListForIOU();
        }

        // ================= DA LIST LOGIC =================
        function loadDAListForIOU() {
            const selectAdd = document.getElementById('iou_da_name');
            selectAdd.innerHTML = '<option value="">Select DA</option>'; 
            
            database.ref('Users').once('value', snap => {
                if(snap.exists()){
                    snap.forEach(child => {
                        const u = child.val();
                        if(u.role !== 'admin' && u.role !== 'superadmin') {
                            daListCache[child.key] = u.name;
                            const opt = `<option value="${child.key}">${u.name}</option>`;
                            selectAdd.innerHTML += opt; 
                        }
                    });
                }
            });
        }

        // ================= CALCULATION LOGIC =================
        function calcIouPercent() {
            const sales = parseFloat(document.getElementById('iou_sales').value) || 0;
            const returnVal = parseFloat(document.getElementById('iou_return').value) || 0;
            const sold = sales - returnVal;
            const taka = parseFloat(document.getElementById('iou_taka').value) || 0;
            
            document.getElementById('iou_sold').value = sold;
            
            if (sold > 0) {
                document.getElementById('iou_percent').value = ((taka / sold) * 100).toFixed(2);
            } else {
                document.getElementById('iou_percent').value = "0";
            }
        }

        // ================= SAVE & CLEAR LOGIC =================
        function saveIOU() {
            const daId = document.getElementById('iou_da_name').value;
            if(!daId) { alert("Select DA"); return; }
            
            const salesVal = parseFloat(document.getElementById('iou_sales').value) || 0;
            const returnVal = parseFloat(document.getElementById('iou_return').value) || 0;
            const soldVal = salesVal - returnVal;
            const iouType = document.getElementById('iou_type').value;

            const data = {
                date: document.getElementById('iou_date').value,
                daId: daId, 
                daName: document.getElementById('iou_da_name').selectedOptions[0].text,
                territory: document.getElementById('iou_territory').value, 
                mpo: document.getElementById('iou_mpo').value, 
                summary: document.getElementById('iou_summary').value,
                sales: salesVal, 
                returnVal: returnVal, 
                soldVal: soldVal, 
                qty: parseInt(document.getElementById('iou_qty').value) || 0,
                bundleQty: parseInt(document.getElementById('iou_bundle_qty').value) || 0,
                taka: parseFloat(document.getElementById('iou_taka').value) || 0, 
                percent: document.getElementById('iou_percent').value, 
                status: 'active',
                type: iouType,
                createdBy: currentUser.name,
                createdAt: Date.now()
            };

            const btn = document.getElementById('iou_save_btn');
            btn.innerText = "Saving...";
            btn.disabled = true;

            const op = editingIouId ? database.ref('IOU_List/' + editingIouId).update(data) : database.ref('IOU_List').push(data);
            
            op.then(() => { 
                alert(editingIouId ? "Updated Successfully!" : "Saved Successfully!"); 
                clearIOUForm(); 
                btn.innerText = "Save IOU Entry";
                btn.disabled = false;
            }).catch(e => {
                alert("Error: " + e.message);
                btn.innerText = "Save IOU Entry";
                btn.disabled = false;
            });
        }

        function clearIOUForm() {
            document.getElementById('iou_date').value = ''; 
            document.getElementById('iou_da_name').value = ''; 
            document.getElementById('iou_territory').value = '';
            document.getElementById('iou_mpo').value = ''; 
            document.getElementById('iou_summary').value = ''; 
            document.getElementById('iou_sales').value = '';
            document.getElementById('iou_return').value = ''; 
            document.getElementById('iou_sold').value = '';
            document.getElementById('iou_qty').value = ''; 
            document.getElementById('iou_bundle_qty').value = ''; 
            document.getElementById('iou_taka').value = ''; 
            document.getElementById('iou_percent').value = '0';
            document.getElementById('iou_type').value = 'Delivery'; 
            
            editingIouId = null; 
            document.getElementById('iou_save_btn').innerText = "Save IOU Entry"; 
            document.getElementById('iou_cancel_btn').classList.add('hidden');
        }
    </script>
</body>
</html>
