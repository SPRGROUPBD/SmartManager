<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartManager – Complete Management System</title>
    <style>
        /* Reset and Base Styles */
        body {
            font-family: Tahoma, Verdana, sans-serif;
            background-color: #c0c0c0; /* Classic Windows Gray */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header Styling */
        .header {
            background-color: #000080; /* Navy Blue */
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 3px solid #ffffff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Main Container */
        .main-wrapper {
            flex: 1; /* Pushes footer down */
            display: flex;
            justify-content: center;
            align-items: center; /* Vertically center the content */
            padding: 20px;
        }

        .container {
            display: flex;
            flex-wrap: wrap; /* Allows wrapping on mobile */
            justify-content: center;
            gap: 20px;
            max-width: 800px;
            width: 100%;
            background-color: #d4d0c8;
            padding: 15px;
            border: 2px solid #808080;
            border-right-color: #ffffff;
            border-bottom-color: #ffffff;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.3);
        }

        /* Columns (Sidebar & Rightbar) */
        .sidebar, .rightbar {
            flex: 1;
            min-width: 250px; /* Ensures buttons don't get too squished */
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .section-title {
            font-size: 14px;
            font-weight: bold;
            color: #000080;
            margin-bottom: 5px;
            border-bottom: 1px solid #808080;
            padding-bottom: 3px;
        }

        /* Classic 3D Button Styling */
        .vbbtn {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 12px 15px;
            background-color: #d4d0c8;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff; /* 3D Bevel Effect */
            cursor: pointer;
            font-family: Tahoma, sans-serif;
            font-weight: bold;
            font-size: 14px;
            color: #000;
            text-align: left;
            outline: none;
            transition: background-color 0.1s;
        }

        .vbbtn:hover {
            background-color: #e0e0e0;
        }

        .vbbtn:active {
            border-color: #808080 #ffffff #ffffff #808080; /* Pressed Effect */
            background-color: #c0c0c0;
            transform: translate(1px, 1px);
        }

        .icon {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }

        /* Footer Styling */
        .footer {
            background-color: #000080;
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 12px;
            border-top: 2px solid #ffffff;
            margin-top: auto;
        }

        /* Responsive Adjustments */
        @media (max-width: 600px) {
            .container {
                flex-direction: column;
            }
            .sidebar, .rightbar {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        SmartManager – Complete Management System
    </div>

    <div class="main-wrapper">
        <div class="container">

            <!-- LEFT COLUMN -->
            <div class="sidebar">
                <div class="section-title">ENTRY MENU</div>
                
                <!-- Bill Entry Button (Fixed Link) -->
                <button class="vbbtn" onclick="openPage('https://sprgroupbd.github.io/SmartManager/bill')">
                    <img src="https://img.icons8.com/ios-filled/50/edit.png" alt="Bill Icon" class="icon">
                    Bill Entry
                </button>

                <!-- IOU Entry Button -->
                <button class="vbbtn" onclick="openPage('https://sprgroupbd.github.io/SmartManager/IOU')">
                    <img src="https://img.icons8.com/ios-filled/50/money.png" alt="Money Icon" class="icon">
                    IOU Entry
                </button>

                <!-- History Button (Fixed Broken HTML) -->
                <button class="vbbtn" onclick="openPage('https://sprgroupbd.github.io/SmartManager/user')">
                    <img src="https://img.icons8.com/ios-filled/50/activity-history.png" alt="History Icon" class="icon">
                    History
                </button>
            </div>

            <!-- RIGHT COLUMN -->
            <div class="rightbar">
                <div class="section-title">ACTIONS & REPORTS</div>

                <!-- Sample Entry Button (Fixed function name typo) -->
                <button class="vbbtn" onclick="openPage('https://sprgroupbd.github.io/monico/')">
                    <img src="https://img.icons8.com/?size=100&id=PaaXUNSFPwjh&format=png&color=000000" alt="Print Icon" class="icon">
                    Sample Entry
                </button>

                <!-- Report Button -->
                <button class="vbbtn" onclick="openPage('report.html')">
                    <img src="https://img.icons8.com/ios-filled/50/combo-chart.png" alt="Chart Icon" class="icon">
                    Report
                </button>

                <!-- Settings Button -->
                <button class="vbbtn" onclick="openPage('settings.html')">
                    <img src="https://img.icons8.com/ios-filled/50/settings.png" alt="Settings Icon" class="icon">
                    Settings
                </button>
            </div>

        </div>
    </div>

    <div class="footer">
        Developed By: <b>Md Sajjad Ahmed</b>
    </div>

    <script>
        function openPage(page) {
            // Ensure we don't navigate if the button is clicked but no link is set
            if(page) {
                window.location.href = page;
            }
        }
    </script>

</body>
</html>
