<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>New User Record - Monico Pharma</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #C0C0C0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 14px; }
        
        /* Login Container */
        .login-container{
            max-width:350px;
            margin: 100px auto;
        }

        /* Main Container */
        .user-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 10px;
        }

        /* card = VB6 form style */
        .card{
            background:#C0C0C0;
            border:2px solid #808080;
            box-shadow: inset 2px 2px #ffffff, inset -2px -2px #404040;
        }

        /* title bar */
        .card-header{
            background:#000080 !important;
            color:white !important;
            font-weight:bold;
        }

        /* textbox */
        .form-control{
            border:2px inset #808080;
            border-radius:0;
        }

        /* Image Preview */
        .profile-img-thumb { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #0d6efd; background: #fff; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- LOGIN SECTION -->
    <div id="login_section" class="container login-container">
        <div class="card shadow-lg">
            <div class="card-header bg-primary text-white text-center"><h4>System Login</h4></div>
            <div class="card-body">
                <div class="mb-3"><label>Username</label><input type="text" id="username" class="form-control" placeholder="Enter Username"></div>
                <div class="mb-3"><label>Password</label><input type="password" id="password" class="form-control" placeholder="Enter Password"></div>
                <button onclick="handleLogin()" class="btn btn-primary w-100">Login</button>
            </div>
        </div>
    </div>

    <!-- USER RECORD SECTION -->
    <div id="user_section" class="container user-container hidden">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h4 class="mb-0 text-primary"><i class="bi bi-person-plus-fill"></i> New User Record</h4>
            <div>
                <span id="welcome_msg" class="me-3 fw-bold text-secondary"></span>
                <button onclick="logout()" class="btn btn-danger btn-sm"><i class="bi bi-box-arrow-right"></i> Logout</button>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white py-2">
                <h6 class="mb-0">Add New User</h6>
            </div>
            <div class="card-body">
                <div class="row g-2">
                    
                    <!-- Personal Info -->
                    <div class="col-md-6">
                        <label class="fw-bold text-muted">ID (Manual)</label>
                        <input type="text" id="new_user_id" class="form-control form-control-sm" placeholder="e.g. DA-001">
                    </div>
                    <div class="col-md-6">
                        <label class="fw-bold text-muted">Name</label>
                        <input type="text" id="new_user_name" class="form-control form-control-sm" placeholder="Full Name">
                    </div>
                    
                    <div class="col-md-6">
                        <label class="fw-bold text-muted">Photo</label>
                        <div class="d-flex align-items-center">
                            <input type="file" id="new_user_photo" class="form-control form-control-sm me-2" accept="image/*" onchange="previewUserPhoto(this)">
                            <img id="photo_preview" src="" class="profile-img-thumb hidden">
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="fw-bold text-muted">Phone</label>
                        <input type="text" id="new_user_phone" class="form-control form-control-sm" placeholder="01xxxxxxxxx">
                    </div>
                    
                    <div class="col-md-6">
                        <label class="fw-bold text-muted">Depot</label>
                        <select id="new_user_depot" class="form-select form-select-sm">
                            <option value="Kushtia">Kushtia</option>
                            <option value="Other Depot">Other Depot</option>
                        </select>
                    </div>

                    <div class="col-12"><hr class="my-2"></div>
                    
                    <!-- Login Info -->
                    <h6 class="text-muted col-12 mb-2 fw-bold">Login Information</h6>
                    
                    <div class="col-md-6">
                        <label class="fw-bold text-muted">Username</label>
                        <input type="text" id="new_user_username" class="form-control form-control-sm" placeholder="Login ID">
                    </div>
                    <div class="col-md-6">
                        <label class="fw-bold text-muted">Password</label>
                        <input type="text" id="new_user_pass" class="form-control form-control-sm" placeholder="Password">
                    </div>
                    <div class="col-md-6">
                        <label class="fw-bold text-muted">Role Type</label>
                        <select id="new_user_role" class="form-select form-select-sm">
                            <option value="user">User (Depot Based)</option>
                            <option value="admin">Admin (DIC)</option>
                            <option value="superadmin">Super Admin (RSM)</option>
                        </select>
                    </div>
                    
                    <div class="col-12 mt-3 text-end">
                        <button onclick="saveNewUser()" class="btn btn-success px-4"><i class="bi bi-save"></i> Save Record</button>
                    </div>
                </div>
            </div>
            <div class="card-footer text-muted text-center" style="background: #e9ecef; border-top: 2px solid #808080;">
                MONICO PHARMA LTD - Internal Use Only
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // ================= FIREBASE CONFIGURATION =================
        const firebaseConfig = {
            apiKey: "AIzaSyBEaGG_UsXGf6RGHQ_ckalf33fLla-P2J8",
            authDomain: "whatapp-8d8ed.firebaseapp.com",
            databaseURL: "https://whatapp-8d8ed-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "whatapp-8d8ed",
            storageBucket: "whatapp-8d8ed.firebasestorage.app",
            messagingSenderId: "618833956157",
            appId: "1:618833956157:web:2c3835d5c03668afa7c954",
            measurementId: "G-JLG1K25Z7N"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentUser = null;
        let userPhotoBase64 = null;

        // ================= LOGIN LOGIC =================
        function handleLogin() {
            const userVal = document.getElementById('username').value;
            const passVal = document.getElementById('password').value;

            // Superadmin Hardcoded Login
            if (userVal === 'KS' && passVal === 'Monico@Ku007') {
                currentUser = { name: 'Md Sajjad Ahmed', role: 'superadmin', depot: 'Kushtia', id: 'admin_001' };
                showUserPage();
                return;
            }

            // Database Login
            const userRef = database.ref('Users');
            userRef.orderByChild('username').equalTo(userVal).once('value', (snapshot) => {
                if (snapshot.exists()) {
                    snapshot.forEach((childSnapshot) => {
                        const userData = childSnapshot.val();
                        if (userData.password === passVal) {
                            currentUser = {
                                name: userData.name,
                                role: userData.role || 'user', 
                                depot: userData.depot,
                                id: childSnapshot.key
                            };
                            showUserPage();
                        } else { alert("Password Incorrect!"); }
                    });
                } else { alert("User not found!"); }
            }, (error) => {
                console.error("Login Error:", error);
                alert("Database Connection Failed!");
            });
        }

        function logout() {
            currentUser = null;
            location.reload();
        }

        function showUserPage() {
            document.getElementById('login_section').classList.add('hidden');
            document.getElementById('user_section').classList.remove('hidden');
            
            document.getElementById('welcome_msg').innerText = "Welcome, " + currentUser.name;
            
            // Only Admin or Superadmin can access
            if(currentUser.role === 'user') {
                alert("Access Denied. Admins only.");
                logout();
                return;
            }
        }

        // ================= IMAGE HANDLING =================
        function previewUserPhoto(input) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function (e) {
                    document.getElementById('photo_preview').src = e.target.result;
                    document.getElementById('photo_preview').classList.remove('hidden');
                    userPhotoBase64 = e.target.result; 
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // ================= SAVE USER LOGIC =================
        function saveNewUser() {
            const userIdManual = document.getElementById('new_user_id').value.trim();
            const name = document.getElementById('new_user_name').value.trim();
            const phone = document.getElementById('new_user_phone').value.trim();
            const depot = document.getElementById('new_user_depot').value;
            const username = document.getElementById('new_user_username').value.trim();
            const password = document.getElementById('new_user_pass').value.trim();
            const role = document.getElementById('new_user_role').value;

            if (!name || !username || !password || !userIdManual) { 
                alert("Fill required fields (ID, Name, Username, Password)"); 
                return; 
            }
            
            const btn = document.querySelector('.btn-success');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Saving...';
            btn.disabled = true;

            const newUserRef = database.ref('Users').push();
            const userData = { 
                userId: userIdManual,
                name: name, 
                phone: phone, 
                depot: depot, 
                username: username, 
                password: password, 
                role: role,
                createdAt: Date.now()
            };

            if(userPhotoBase64) {
                userData.photoUrl = userPhotoBase64;
            }

            newUserRef.set(userData, (error) => {
                btn.innerHTML = originalText;
                btn.disabled = false;

                if(error) {
                    alert("Error creating user"); 
                    console.error(error);
                } else { 
                    alert("User Created Successfully!"); 
                    // Reset Form
                    document.getElementById('new_user_id').value = ''; 
                    document.getElementById('new_user_name').value = ''; 
                    document.getElementById('new_user_phone').value = '';
                    document.getElementById('new_user_username').value = ''; 
                    document.getElementById('new_user_pass').value = ''; 
                    document.getElementById('new_user_depot').value = 'Kushtia';
                    document.getElementById('new_user_role').value = 'user';
                    document.getElementById('new_user_photo').value = '';
                    document.getElementById('photo_preview').classList.add('hidden');
                    userPhotoBase64 = null;
                }
            });
        }
    </script>
</body>
</html>
